<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control Panel</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Orbitron', sans-serif;
}

body {
    height: 100vh;
    overflow: hidden;
    background: #05070f;
    color: white;
}

/* BACKGROUND */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -2;
}

/* SOFT DARK GRADIENT OVERLAY */
body::before {
    content: "";
    position: fixed;
    top:0;left:0;
    width:100%;
    height:100%;
    background: radial-gradient(circle at top, rgba(0,255,255,0.08), transparent 60%);
    z-index: -1;
}

/* CURSOR */
.cursor {
    position: fixed;
    width: 14px;
    height: 14px;
    background: cyan;
    border-radius: 50%;
    pointer-events: none;
    box-shadow: 0 0 15px cyan;
    transform: translate(-50%, -50%);
    transition: 0.05s linear;
}

/* SIDEBAR */
.sidebar {
    position: fixed;
    left: 15px;
    top: 50%;
    transform: translateY(-50%);
    width: 60px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    border-radius: 18px;
    padding: 10px 0;
    transition: 0.3s;
}

.sidebar:hover {
    width: 160px;
}

.sidebar button {
    width: 100%;
    padding: 14px;
    background: none;
    border: none;
    color: #7df9ff;
    text-align: left;
    cursor: pointer;
    font-size: 13px;
    transition: 0.25s;
    opacity: 0.85;
}

.sidebar button:hover {
    background: rgba(0,255,255,0.08);
    padding-left: 18px;
    opacity: 1;
}

/* MAIN CARD */
.container {
    position: absolute;
    top: 50%;
    left: 55%;
    transform: translate(-50%, -50%);
    text-align: center;
    animation: fade 0.8s ease;
}

@keyframes fade {
    from { opacity: 0; transform: translate(-50%, -60%); }
    to { opacity: 1; transform: translate(-50%, -50%); }
}

.title {
    font-size: 38px;
    font-weight: 700;
    color: #7df9ff;
    letter-spacing: 2px;
    margin-bottom: 25px;
    text-shadow: 0 0 20px rgba(0,255,255,0.3);
}

/* INPUT */
input {
    width: 340px;
    padding: 14px 18px;
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.03);
    color: white;
    outline: none;
    text-align: center;
    transition: 0.3s;
    backdrop-filter: blur(10px);
}

input:focus {
    border: 1px solid cyan;
    box-shadow: 0 0 15px rgba(0,255,255,0.2);
    transform: scale(1.02);
}

/* BUTTON */
button.send {
    margin-top: 15px;
    padding: 14px 30px;
    border-radius: 14px;
    border: none;
    background: linear-gradient(90deg, #00f5ff, #00a6ff);
    color: black;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button.send:hover {
    transform: translateY(-2px) scale(1.03);
    box-shadow: 0 10px 25px rgba(0,255,255,0.2);
}

/* FOOTER */
.footer {
    margin-top: 18px;
    font-size: 12px;
    opacity: 0.5;
}

/* PAGE SWITCH */
.page {
    display: none;
}

.page.active {
    display: block;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>
<div class="cursor" id="cursor"></div>

<!-- SIDEBAR -->
<div class="sidebar">
    <button onclick="show('home')">🏠 Home</button>
    <button onclick="openHelp()">❓ Help</button>
    <button onclick="openInvite()">🔗 Invite</button>
    <button onclick="show('more')">📂 More</button>
</div>

<!-- HOME -->
<div class="page active" id="home">
<div class="container">
    <div class="title">CONTROL</div>

    <input id="msg" placeholder="Type message...">
    <br>
    <button class="send" onclick="send()">Send</button>

    <div class="footer">Firebase • Secure Channel</div>
</div>
</div>

<!-- MORE -->
<div class="page" id="more">
<div class="container">
    <div class="title">More</div>
    <p style="opacity:0.5;">Add tools here</p>
</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>

<script>

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyB5a-y6d0v-EAy0_Vm3Viy4YHyVC0owasA",
  authDomain: "chat-panel-f23cb.firebaseapp.com",
  databaseURL: "https://chat-panel-f23cb-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "chat-panel-f23cb",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* SEND */
function send() {
    const msg = document.getElementById("msg").value;
    if (!msg) return;

    db.ref("messages").push({
        text: msg,
        time: new Date().toLocaleString()
    });

    document.getElementById("msg").value = "";
}

/* PAGE */
function show(id) {
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

/* LINKS */
function openHelp() {
    window.open("https://discord.com", "_blank");
}
function openInvite() {
    window.open("https://discord.gg", "_blank");
}

/* CURSOR SMOOTH */
let cursor = document.getElementById("cursor");
let mouseX = 0, mouseY = 0;
let curX = 0, curY = 0;

document.addEventListener("mousemove", e => {
    mouseX = e.clientX;
    mouseY = e.clientY;
});

function animateCursor() {
    curX += (mouseX - curX) * 0.15;
    curY += (mouseY - curY) * 0.15;
    cursor.style.left = curX + "px";
    cursor.style.top = curY + "px";
    requestAnimationFrame(animateCursor);
}
animateCursor();

/* PARTICLES (SMOOTHER) */
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

let p = [];

for (let i = 0; i < 80; i++) {
    p.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        v: Math.random() * 0.6 + 0.2
    });
}

function draw() {
    ctx.fillStyle = "#05070f";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    p.forEach(o => {
        ctx.fillStyle = "rgba(0,255,255,0.5)";
        ctx.beginPath();
        ctx.arc(o.x, o.y, 1.2, 0, Math.PI * 2);
        ctx.fill();

        o.y += o.v;
        if (o.y > canvas.height) o.y = 0;
    });

    requestAnimationFrame(draw);
}
draw();

</script>

</body>
</html>
